# Netlify Configuration File
# This file configures how Netlify builds and deploys your site

[build]
  # The directory to use as the publish directory
  publish = "."
  
  # The command to run to build your site
  command = "echo 'No build required for static HTML site'"

# Redirects and rewrites
# Uncomment the following section to enable SPA routing
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

# Custom headers
[[headers]]
  # Define which paths each header applies to
  for = "/*"
  
  # Security headers
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' data: https:; img-src 'self' data: https:; connect-src 'self' https:;"

# Cache control for static assets
[[headers]]
  for = "/assets/*"
  
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"